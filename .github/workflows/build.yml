name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            goos: darwin
            goarch: arm64
            ext: ''
          - name: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
          - name: linux-arm64-raspi64
            goos: linux
            goarch: arm64
            ext: ''
          - name: linux-armv7-raspi32
            goos: linux
            goarch: arm
            goarm: '7'
            ext: ''
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist/${{ matrix.name }}
          go build \
            -trimpath \
            -ldflags='-s -w' \
            -o dist/${{ matrix.name }}/forwardator${{ matrix.ext }} \
            .

      - name: Package artifact
        shell: bash
        run: |
          cd dist/${{ matrix.name }}
          if [[ '${{ matrix.goos }}' == 'windows' ]]; then
            zip -9 ../forwardator-${{ matrix.name }}.zip forwardator${{ matrix.ext }}
          else
            tar -czf ../forwardator-${{ matrix.name }}.tar.gz forwardator${{ matrix.ext }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forwardator-${{ matrix.name }}
          path: |
            dist/forwardator-${{ matrix.name }}.tar.gz
            dist/forwardator-${{ matrix.name }}.zip
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Show release files
        run: ls -la dist/release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true
